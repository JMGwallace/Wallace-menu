<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallace Menu Left</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

#menu {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
}
</style>
</head>

<body>
<img id="menu" src="Left.png">

<script>
setInterval(function () {
    document.getElementById("menu").src =
        "Left.png?v=" + new Date().getTime();
}, 300000);
</script>
</body>
</html>
